services:
  - type: web
    name: kosgeb-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        sync: false          # Render dashboard'dan girilecek
      - key: DATABASE_URL
        sync: false          # Supabase URL — dashboard'dan girilecek
      - key: REDIS_URL
        sync: false          # Upstash URL — dashboard'dan girilecek
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: IYZICO_API_KEY
        sync: false
      - key: IYZICO_SECRET_KEY
        sync: false
      - key: IYZICO_SANDBOX
        value: false
      - key: IYZICO_BASE_URL
        value: https://api.iyzipay.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@kosgebhibe.com
      - key: FROM_EMAIL
        value: noreply@kosgebhibe.com
      - key: FROM_NAME
        value: kosgebhibe.com
      - key: FRONTEND_URL
        value: https://kosgebhibe.com
      - key: ENCRYPTION_KEY
        sync: false
      - key: PAYMENT_REQUIRED
        value: true
