name: Keep Render Backend Alive

on:
  schedule:
    # Her 10 dakikada bir ping at (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:   # Manuel tetikleme de mümkün

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf https://kosgeb-backend-xxxx.onrender.com/health || echo "Backend uyandırılıyor..."
        # Not: URL'i Render'dan aldıktan sonra güncelleyin
