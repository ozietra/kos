worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Rate limiting: API ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── HTTP → HTTPS yönlendirme ─────────────────────────────────────────────
    server {
        listen 80;
        server_name kosgebhibe.com www.kosgebhibe.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://kosgebhibe.com$request_uri;
        }
    }

    # ── www → apex yönlendirme (HTTPS) ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name www.kosgebhibe.com;

        ssl_certificate     /etc/nginx/ssl/live/kosgebhibe.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/kosgebhibe.com/privkey.pem;

        return 301 https://kosgebhibe.com$request_uri;
    }

    # ── Ana sunucu ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name kosgebhibe.com;

        ssl_certificate     /etc/nginx/ssl/live/kosgebhibe.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/kosgebhibe.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;

        # Güvenlik başlıkları
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # İstek boyutu
        client_max_body_size 10m;

        # ── API → Backend ────────────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # SSE (Server-Sent Events) için
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # ── Frontend → Next.js ───────────────────────────────────────────────
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # ── Statik dosyalar ──────────────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend:3000;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
