# Cloudflare Tunnel arkası iç yönlendirici.
# SSL'i Cloudflare sonlandırır; burada yönlendirme/redirect YOK.
# Tüm istekler cloudflared → nginx:80 üzerinden gelir.

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:3000;
    }

    # Cloudflare gerçek ziyaretçi IP'sini bu başlıkta gönderir
    real_ip_header CF-Connecting-IP;

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 10m;

        # API → backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # SSE (canlı üretim akışı) için tampon kapalı, uzun timeout
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        # Geri kalan her şey → Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
